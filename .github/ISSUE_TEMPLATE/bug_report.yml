name: Bug Report
description: Report a bug with CodePress Engine
title: "[BUG] "
labels: ["bug"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I am using the latest version of `@codepress/codepress-engine`
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Install `@codepress/codepress-engine@x.y.z`
        2. Add to next.config.mjs...
        3. Run `npm run dev`
        4. See error...
    validations:
      required: true

  - type: dropdown
    id: plugin
    attributes:
      label: Plugin Type
      description: Which plugin are you using?
      options:
        - SWC (Next.js)
        - Babel
        - Webpack Plugin
        - Vite Plugin
        - esbuild Plugin
        - Dev Server / CLI
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Engine Version
      description: Output of `npm list @codepress/codepress-engine`
      placeholder: "0.9.4"
    validations:
      required: true

  - type: input
    id: framework
    attributes:
      label: Framework & Version
      description: "e.g., Next.js 15.1.0, Vite 6.0.0"
      placeholder: "Next.js 15.1.0"

  - type: input
    id: node
    attributes:
      label: Node.js Version
      description: Output of `node --version`
      placeholder: "v22.0.0"

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste any relevant error output or logs.
      render: shell
